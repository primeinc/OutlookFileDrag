name: CI

# PR/push gate, two jobs:
#  - compile-check: the platform-independent interop core, built on Linux (fast;
#    catches breakage in the audit-critical native code with no Windows runner).
#  - build-windows: the full VSTO add-in + WiX MSIs, built on Windows via the
#    reusable build-windows workflow (which runs the justfile recipes).

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:
  compile-check:
    name: Interop core compile check (Linux)
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build interop core (net472 via reference assemblies)
        run: dotnet build ci/compile-check/OutlookFileDrag.Core.CompileCheck.csproj -c Release

  build-windows:
    name: Add-in + MSIs (Windows)
    uses: ./.github/workflows/build-windows.yml
