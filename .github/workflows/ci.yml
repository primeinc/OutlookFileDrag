name: CI

# Compile-gate the platform-independent interop core on Linux.
#
# The full VSTO add-in + MSI are Windows-only (VSTO is .NET Framework + Visual
# Studio only per Microsoft Learn) and are built with build.ps1 on Windows.
# Everything with the audit-critical native code (IAT redirect, PE/import-table
# walking, P/Invoke, OLE data object) has no Microsoft.Office.* dependency, so it
# compiles cross-platform via the net472 reference assemblies -- no Windows
# runner, no Visual Studio, no PowerShell required to catch a broken build.

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:
  compile-check:
    name: Interop core compile check (Linux)
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build interop core (net472 via reference assemblies)
        run: dotnet build ci/compile-check/OutlookFileDrag.Core.CompileCheck.csproj -c Release
