name: build-windows

# Reusable Windows build. Provisions first-party tools, then runs the SAME `just`
# recipes a developer runs locally (the justfile is the single source of build
# truth -- this workflow contains no build logic of its own). The version is
# derived from git tags by MinVer inside the recipes, which is why checkout uses
# fetch-depth: 0.
#
# Runs on windows-2022 because the VSTO add-in needs full MSBuild with the
# "Office/SharePoint development" workload, which ships in that runner image
# (Microsoft.VisualStudio.Workload.Office; verified in the runner-images manifest).
# It cannot build on Linux -- the VSTO targets are absent from the .NET SDK.

on:
  workflow_call:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
    steps:
      # Full history + tags so MinVer can derive the version (it needs depth).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Puts the Visual Studio MSBuild (with the VSTO targets) on PATH via vswhere.
      - uses: microsoft/setup-msbuild@v3

      # packages.config restore needs nuget.exe; `dotnet restore` only understands
      # PackageReference.
      - uses: NuGet/setup-nuget@v4

      # Chocolatey is preinstalled on the runner; casey/just documents
      # `choco install just` as the GitHub Actions install method.
      - name: Install just
        run: choco install just --yes --no-progress

      # build (add-in) -> msi (x86 + x64). The version is derived from the git tag
      # by MinVer. Identical to local `just release`.
      - name: Build add-in + MSIs
        run: just release

      - uses: actions/upload-artifact@v7
        with:
          name: msi
          path: dist/*.msi
          if-no-files-found: error
