name: Release

# On a pushed v* tag: build the add-in + MSIs on Windows (reusing build-windows),
# then publish a GitHub Release with the MSIs attached, using the first-party
# GitHub CLI (`gh release create`), which is preinstalled on the runner.
#
# The version is not threaded through here: MinVer derives it from the tag inside
# the build recipes (build-windows checks out with fetch-depth: 0), so a `v1.0.14`
# tag yields MSIs versioned 1.0.14 with no string-munging.

on:
  push:
    tags: ['v*']

permissions:
  contents: write          # required to create the release / upload assets

jobs:
  build:
    uses: ./.github/workflows/build-windows.yml

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: msi
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.msi --repo "$GITHUB_REPOSITORY" --generate-notes
