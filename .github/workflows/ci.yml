name: CI

# Two jobs:
#  - compile-check: the platform-independent interop core on Linux (fast; runs on
#    every push and PR so breakage in the audit-critical native code is caught
#    without a Windows runner).
#  - build-windows: the full VSTO add-in + WiX MSIs. This is the slow/expensive
#    job, so it is gated to the release line -- pushes to `master` and
#    `release/**` -- and does NOT run on pull requests. Release tags are covered
#    separately by release.yml.

on:
  push:
    branches: [ master, 'release/**' ]
  pull_request:

# Cancel superseded in-progress runs for the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile-check:
    name: Interop core compile check (Linux)
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build interop core (net472 via reference assemblies)
        run: dotnet build ci/compile-check/OutlookFileDrag.Core.CompileCheck.csproj -c Release

  build-windows:
    name: Add-in + MSIs (Windows)
    # Release line only -- skip on pull requests.
    if: github.event_name == 'push'
    uses: ./.github/workflows/build-windows.yml
